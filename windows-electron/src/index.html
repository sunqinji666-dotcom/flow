<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: linear-gradient(135deg, #151B24, #10141B, #090B10); color: #F2F7FF; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 34px 24px 16px; user-select: none; }

/* Title bar */
.top { display: flex; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.brand { font-size: 19px; font-weight: 900; font-style: italic; background: linear-gradient(90deg, #F2F7FF, #45D6FF, #F3B85B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; }
.status-badge { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.08); border-radius: 20px; padding: 6px 14px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #71859B; }
.dot.on { background: #34C759; box-shadow: 0 0 12px rgba(52,199,89,0.6); }
.status-text { font-size: 12px; color: #B8C8D8; }

/* Connect button */
.btn-wrap { position: relative; width: 210px; height: 198px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
.btn-connect { width: 148px; height: 148px; border-radius: 50%; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 48px; font-weight: 900; }
.btn-connect.off { background: radial-gradient(circle at 30% 20%, #25242A, #151519); border: 3px solid rgba(243,184,91,0.55); color: #F3B85B; }
.btn-connect.on { background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.16), #0D3146, #071520); border: 6px solid #45D6FF; box-shadow: 0 0 40px rgba(69,214,255,0.3); }
.btn-connect.on .speed-num { font-size: 42px; color: #45D6FF; text-shadow: 0 0 24px rgba(69,214,255,0.3); }
.btn-connect.on .speed-unit { font-size: 15px; color: #9DEAFF; }

/* Node info */
.node-name { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
.node-detail { font-size: 13px; color: #71859B; margin-bottom: 10px; }

/* Node selector */
.node-select { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: #F2F7FF; font-size: 12px; font-weight: 700; cursor: pointer; text-align: left; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.node-select:hover { background: rgba(255,255,255,0.08); }

/* Mode banner */
.mode-banner { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.05); border-radius: 14px; margin-bottom: 6px; }
.mode-title { font-size: 11px; font-weight: 900; }
.mode-detail { font-size: 9px; color: #71859B; }
.mode-routing { font-size: 9px; font-weight: 900; color: #B8C8D8; background: rgba(255,255,255,0.06); border-radius: 12px; padding: 4px 8px; }

/* Stats */
.stats-row { width: 100%; display: flex; gap: 8px; margin-bottom: 6px; }
.pill { flex: 1; display: flex; align-items: center; gap: 6px; padding: 9px 12px; background: rgba(255,255,255,0.04); border-radius: 20px; font-size: 12px; }
.pill-label { color: #71859B; font-size: 10px; }
.pill-value { font-weight: 900; color: #B8C8D8; }

.traffic-row { width: 100%; display: flex; gap: 8px; margin-bottom: 6px; }
.traffic-box { flex: 1; text-align: center; padding: 9px 8px; background: rgba(255,255,255,0.04); border-radius: 12px; }
.traffic-label { font-size: 10px; color: #71859B; }
.traffic-value { font-size: 13px; font-weight: 900; color: #F3B85B; }
.traffic-note { font-size: 8px; color: #4E5965; }

.spacer { flex: 1; }

.gear { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: #B8C8D8; margin-bottom: 12px; }
.gear:hover { background: rgba(255,255,255,0.1); }

/* Modal */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 10; }
.modal { background: #18202B; border-radius: 20px; padding: 18px; width: 100%; max-width: 340px; max-height: 70vh; overflow-y: auto; margin-bottom: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
.modal h3 { font-size: 15px; font-weight: 900; margin-bottom: 10px; }
.modal-row { padding: 8px 10px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.modal-row:hover { background: rgba(255,255,255,0.06); }
.modal-row.selected { background: #242321; border: 1px solid rgba(243,184,91,0.4); }
.modal-node-name { font-size: 12px; font-weight: 900; }
.modal-node-detail { font-size: 9px; color: #71859B; }
.modal-node-latency { font-size: 10px; font-weight: 900; color: #34C759; }

.settings-item { margin-bottom: 10px; }
.settings-item label { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 900; }
.toggle { width: 40px; height: 22px; border-radius: 11px; background: #3A3A3C; cursor: pointer; position: relative; }
.toggle.on { background: #34C759; }
.toggle::after { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: white; top: 2px; left: 2px; transition: 0.2s; }
.toggle.on::after { left: 20px; }

.chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { padding: 6px 10px; border-radius: 12px; font-size: 10px; font-weight: 900; cursor: pointer; background: rgba(255,255,255,0.05); color: #B8C8D8; }
.chip.active { background: #F3B85B; color: #071520; }

.btn-small { padding: 6px 14px; border-radius: 8px; background: #F3B85B; color: #071520; font-size: 11px; font-weight: 900; border: none; cursor: pointer; }
</style>
</head>
<body>

<div class="top">
  <span class="brand">Flow</span>
  <div class="status-badge">
    <span class="dot" id="statusDot"></span>
    <span class="status-text" id="statusText">准备就绪</span>
  </div>
</div>

<div class="btn-wrap">
  <button class="btn-connect off" id="btnConnect" onclick="toggleConnection()">
    <span id="connectLabel">连</span>
    <span id="speedParts" style="display:none"><span class="speed-num" id="speedNum">—</span><span class="speed-unit" id="speedUnit"></span></span>
  </button>
</div>

<div class="node-name" id="nodeName">🌐 443-dtfnwuzy</div>
<div class="node-detail" id="nodeDetail">VLESS · TCP · example.com:443</div>

<button class="node-select" id="nodeSelect" onclick="toggleNodePicker()">
  <span id="nodeSelectLabel">🌐 443-dtfnwuzy</span>
  <span style="font-size:10px">▼</span>
</button>

<div class="mode-banner">
  <div>
    <div class="mode-title" id="modeHeadline">本地端口模式</div>
    <div class="mode-detail" id="modeDetail">不改系统代理，其他软件手动填端口</div>
  </div>
  <div class="mode-routing" id="modeRouting">绕过大陆</div>
</div>

<div class="stats-row">
  <div class="pill"><span class="dot" id="pillDot"></span><span class="pill-label">状态</span><span class="pill-value" id="pillStatus">准备就绪</span></div>
  <div class="pill"><span class="dot" id="pillDot2"></span><span class="pill-label">时长</span><span class="pill-value" id="pillDuration">00:00</span></div>
</div>

<div class="traffic-row">
  <div class="traffic-box"><div class="traffic-label">本次</div><div class="traffic-value" id="trafficSession">0 MB</div><div class="traffic-note">连接后统计</div></div>
  <div class="traffic-box"><div class="traffic-label">今日</div><div class="traffic-value" id="trafficToday">0 MB</div><div class="traffic-note">今天已用</div></div>
  <div class="traffic-box"><div class="traffic-label">累计</div><div class="traffic-value" id="trafficTotal">0 MB</div><div class="traffic-note">设备累计</div></div>
</div>

<div class="spacer"></div>

<button class="gear" onclick="toggleSettings()">⚙</button>

<!-- Node picker modal -->
<div id="nodePickerOverlay" class="modal-overlay" style="display:none" onclick="toggleNodePicker()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>选择节点</h3>
    <div id="nodeList"></div>
  </div>
</div>

<!-- Settings modal -->
<div id="settingsOverlay" class="modal-overlay" style="display:none" onclick="toggleSettings()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>设置</h3>
    <div class="settings-item">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-weight:900">系统代理</span>
        <div class="toggle" id="systemProxyToggle" onclick="toggleSystemProxy()"></div>
      </div>
    </div>
    <div class="settings-item">
      <div style="font-weight:900;margin-bottom:6px">分流策略</div>
      <div class="chip-row" id="routingChips">
        <span class="chip active" data-mode="bypassCN" onclick="setRouting('bypassCN')">绕过大陆</span>
        <span class="chip" data-mode="direct" onclick="setRouting('direct')">不代理</span>
        <span class="chip" data-mode="lanOnly" onclick="setRouting('lanOnly')">绕过局域网</span>
        <span class="chip" data-mode="global" onclick="setRouting('global')">全局</span>
      </div>
    </div>
    <div style="margin-top:10px">
      <button class="btn-small" onclick="refreshNodes()">更新节点</button>
    </div>
  </div>
</div>

<script>
let isConnected = false
let systemProxyEnabled = false
let routingMode = 'bypassCN'
let nodes = []
let selectedIndex = 0

function toggleConnection() {
  isConnected = !isConnected
  updateUI()
}

function toggleNodePicker() {
  const el = document.getElementById('nodePickerOverlay')
  el.style.display = el.style.display === 'none' ? 'flex' : 'none'
  if (el.style.display === 'flex') renderNodeList()
}

function toggleSettings() {
  const el = document.getElementById('settingsOverlay')
  el.style.display = el.style.display === 'none' ? 'flex' : 'none'
}

function toggleSystemProxy() {
  systemProxyEnabled = !systemProxyEnabled
  updateUI()
}

function setRouting(mode) {
  routingMode = mode
  document.querySelectorAll('#routingChips .chip').forEach(c => c.classList.toggle('active', c.dataset.mode === mode))
  updateUI()
}

function selectNode(idx) {
  selectedIndex = idx
  document.getElementById('nodePickerOverlay').style.display = 'none'
  updateUI()
}

function renderNodeList() {
  const list = document.getElementById('nodeList')
  if (!nodes.length) { list.innerHTML = '<div style="color:#71859B;font-size:12px;padding:20px">暂无节点</div>'; return }
  list.innerHTML = nodes.map((n, i) => `<div class="modal-row ${i === selectedIndex ? 'selected' : ''}" onclick="selectNode(${i})">
    <div><span style="font-size:18px">${n.flag}</span> <span class="modal-node-name">${n.name}</span><br><span class="modal-node-detail">${(n.protocolType||'vless').toUpperCase()} · ${(n.transport||'tcp').toUpperCase()} · ${n.host}:${n.port}</span></div>
    <span class="modal-node-latency">${n.latency ? (n.latency >= 500 ? (n.latency/1000).toFixed(1)+'s' : n.latency+'ms') : '—'}</span>
  </div>`).join('')
}

function updateUI() {
  const node = nodes[selectedIndex] || { flag: '🌐', name: '示例节点', host: 'example.com', port: 443, protocolType: 'vless', transport: 'tcp', latency: 0 }
  document.getElementById('nodeName').textContent = `${node.flag} ${node.name}`
  document.getElementById('nodeDetail').textContent = `${(node.protocolType||'VLESS').toUpperCase()} · ${(node.transport||'TCP').toUpperCase()} · ${node.host}:${node.port}`
  document.getElementById('nodeSelectLabel').textContent = `${node.flag} ${node.name} ${node.latency ? (node.latency >= 500 ? (node.latency/1000).toFixed(1)+'s' : node.latency+'ms') : '—'}`

  document.getElementById('statusDot').className = 'dot ' + (isConnected ? 'on' : '')
  document.getElementById('pillDot').className = 'dot ' + (isConnected ? 'on' : '')
  document.getElementById('pillDot2').className = 'dot ' + (isConnected ? 'on' : '')
  document.getElementById('statusText').textContent = isConnected ? (systemProxyEnabled ? '系统代理模式' : '本地端口模式') : '准备就绪'
  document.getElementById('pillStatus').textContent = isConnected ? (systemProxyEnabled ? '系统代理已开启' : '本地代理已启动') : '准备就绪'

  document.getElementById('modeHeadline').textContent = systemProxyEnabled ? '系统代理模式' : '本地端口模式'
  document.getElementById('modeDetail').textContent = systemProxyEnabled ? '已接管 Windows 系统代理' : '不改系统代理，其他软件手动填端口'
  document.getElementById('modeRouting').textContent = { direct: '不代理', bypassCN: '绕过大陆', lanOnly: '绕过局域网', global: '全局代理' }[routingMode] || '绕过大陆'

  document.getElementById('systemProxyToggle').className = 'toggle ' + (systemProxyEnabled ? 'on' : '')

  const btn = document.getElementById('btnConnect')
  btn.className = 'btn-connect ' + (isConnected ? 'on' : 'off')
  document.getElementById('connectLabel').style.display = isConnected ? 'none' : 'block'
  document.getElementById('speedParts').style.display = isConnected ? 'flex' : 'none'
  document.getElementById('speedNum').textContent = '—'
  document.getElementById('speedUnit').textContent = ''
}

async function refreshNodes() {
  try {
    const data = await window.flowAPI.refreshNodes()
    if (data && data.length) { nodes = data; selectedIndex = 0 }
  } catch (_) {}
  updateUI()
}

window.addEventListener('DOMContentLoaded', async () => {
  window.flowAPI.onNodesStatus((msg) => { document.getElementById('statusText').textContent = msg });
    window.flowAPI.onNodesLoaded((data) => {
    if (data && data.length) { nodes = data; updateUI() }
  })
  updateUI()
})
</script>
</body>
</html>
